site_name: Git and GitHub for Cybersecurity
site_description: Beginner-friendly Git and GitHub setup, commands, workflows, and security habits for cybersecurity learners.
site_author: Jahid
site_url: https://ijk37.com/git-github/

repo_name: ijk37/git-github
repo_url: https://github.com/ijk37/git-github
edit_uri: edit/main/

docs_dir: .
site_dir: ../git-github-site
use_directory_urls: false
exclude_docs: |
  mkdocs.yml
  requirements.txt
  .gitignore
  /README.md
  .git/**
  tools/**
  assets/site_design.md
  05-resources/**
  !05-resources/README.md
  03-quiz/README.md
  01-notes.md
  02-exercises.md
  03-quiz.md
  04-projects.md

theme:
  name: material
  custom_dir: overrides
  logo: assets/images/git-github-logo.svg
  favicon: assets/images/favicon.svg
  language: en
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: custom
      accent: custom
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: custom
      accent: custom
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
  font:
    text: Inter
    code: JetBrains Mono
  features:
    - announce.dismiss
    - content.action.edit
    - content.code.copy
    - content.code.select
    - content.tabs.link
    - navigation.footer
    - navigation.indexes
    - navigation.instant
    - navigation.instant.prefetch
    - navigation.path
    - navigation.top
    - search.highlight
    - search.share
    - search.suggest
    - toc.follow

plugins:
  - same-dir
  - search
  - callouts

markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - toc:
      permalink: true
  - pymdownx.blocks.caption
  - pymdownx.caret
  - pymdownx.details
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.keys
  - pymdownx.mark
  - pymdownx.snippets
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.tilde

extra_css:
  - assets/stylesheets/extra.css

extra_javascript:
  - assets/javascripts/extra.js

extra:
  generator: false
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/ijk37/git-github
      name: GitHub repository

not_in_nav: |
  README.md

nav:
  - Home: index.md
  - Notes:
      - Overview: 01-notes/README.md
      - "What Git Tracks": 01-notes/01-what-is-git.md
      - "Install and Configure": 01-notes/02-install-configure.md
      - "Repositories, Staging, Commits": 01-notes/03-repositories-staging-commits.md
      - "Branches and Merges": 01-notes/04-branches-merges.md
      - "GitHub Remotes and Auth": 01-notes/05-github-remotes-auth.md
      - "Pull Requests and Collaboration": 01-notes/06-pull-requests-collaboration.md
      - "Security Hygiene and Secrets": 01-notes/07-security-hygiene-secrets.md
      - "Cybersecurity Workflows": 01-notes/08-cybersecurity-workflows.md
  - Exercises:
      - Overview: 02-exercises/README.md
      - "Exercise 01": 02-exercises/01-exercise.md
      - "Exercise 02": 02-exercises/02-exercise.md
      - "Exercise 03": 02-exercises/03-exercise.md
      - "Exercise 04": 02-exercises/04-exercise.md
      - "Exercise 05": 02-exercises/05-exercise.md
      - "Exercise 06": 02-exercises/06-exercise.md
      - "Exercise 07": 02-exercises/07-exercise.md
      - "Exercise 08": 02-exercises/08-exercise.md
  - Quiz: 03-quiz/index.html
  - Projects:
      - Overview: 04-projects/README.md
      - "Secure Git Workstation": 04-projects/01-secure-git-workstation/README.md
      - "GitHub Portfolio Repo": 04-projects/02-github-portfolio-repo/README.md
      - "Incident Response Branching": 04-projects/03-incident-response-branching/README.md
      - "Secret Leak Response": 04-projects/04-secret-leak-response/README.md
      - "Cybersecurity Lab Journal": 04-projects/05-cybersecurity-lab-journal/README.md
  - Resources: 05-resources/README.md
